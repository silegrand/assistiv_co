name: Scrape Involve Kent directory

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        default: full
        options:
          - full              # scrape all listings + category tags
          - categories-only   # reuse existing directory.json, refresh tags only
  schedule:
    - cron: "0 6 1 * *"       # 06:00 on the 1st of each month

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Script and requirements.txt live in tools/directory-export/data/
      - name: Install dependencies
        working-directory: tools/directory-export/data
        run: pip install -r requirements.txt

      - name: Run the scraper
        working-directory: tools/directory-export/data
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FLAG=""
          if [ "$MODE" = "categories-only" ]; then FLAG="--categories-only"; fi
          echo "Run mode: $MODE"
          python scrape_directory.py --base-url https://involvekent.org.uk --outdir output $FLAG

      - name: Upload outputs as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: involve-kent-directory
          path: tools/directory-export/data/output/
          if-no-files-found: warn

      - name: Commit outputs back to the repository
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/directory-export/data/output/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update directory export ($(date -u +%Y-%m-%d))"
            git push
          fi
