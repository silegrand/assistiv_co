name: Scrape Involve Kent directory

# Run manually from the Actions tab, and automatically on the 1st of each month.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The script and requirements.txt live in tools/directory-export/data/
      - name: Install dependencies
        working-directory: tools/directory-export/data
        run: pip install -r requirements.txt

      - name: Run the scraper
        working-directory: tools/directory-export/data
        run: python scrape_directory.py --base-url https://involvekent.org.uk --outdir output

      # Runs even if the scrape failed, so diagnostics.txt is always retrievable.
      - name: Upload outputs as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: involve-kent-directory
          path: tools/directory-export/data/output/
          if-no-files-found: warn

      - name: Commit outputs back to the repository
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/directory-export/data/output/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update directory export ($(date -u +%Y-%m-%d))"
            git push
          fi
