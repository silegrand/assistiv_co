name: Scrape Involve Kent directory

# Run manually from the Actions tab, and automatically on the 1st of each month.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scraper
        run: python scrape_directory.py --base-url https://involvekent.org.uk --outdir data

      - name: Upload outputs as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: involve-kent-directory
          path: data/

      - name: Commit outputs back to the repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update directory export ($(date -u +%Y-%m-%d))"
            git push
          fi
